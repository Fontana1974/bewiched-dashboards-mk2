<div id="wxnudge" style="display:none;margin:2px 0 14px;padding:11px 15px;border-radius:12px;font-size:13.5px;line-height:1.55"></div>
<script>(function(){var LOCS=__LOCS__,SCOPE="__SCOPE__",C={hot:-1.19,cold:0.73,shake:0.42};if(!LOCS||!LOCS.length)return;
var la=LOCS.map(function(x){return x[0]}).join(","),lo=LOCS.map(function(x){return x[1]}).join(",");
var u="https://api.open-meteo.com/v1/forecast?latitude="+la+"&longitude="+lo+"&daily=temperature_2m_max&past_days=14&forecast_days=2&timezone=Europe%2FLondon";
fetch(u).then(function(r){return r.json()}).then(function(j){var A=Array.isArray(j)?j:[j];
var now=new Date();var tmo=new Date(now.getTime()+864e5).toISOString().slice(0,10);var tod=now.toISOString().slice(0,10);
var T=[],B=[];A.forEach(function(loc){if(!loc.daily)return;var t=loc.daily.time,m=loc.daily.temperature_2m_max;var i=t.indexOf(tmo);if(i<0)return;if(m[i]==null)return;T.push(m[i]);
var b=[];for(var k=0;k<t.length;k++){if(t[k]<tod&&m[k]!=null)b.push(m[k]);}if(b.length)B.push(b.reduce(function(a,c){return a+c},0)/b.length);});
if(!T.length||!B.length)return;var av=function(a){return a.reduce(function(x,y){return x+y},0)/a.length};
var tm=av(T),bs=av(B),d=tm-bs,el=document.getElementById("wxnudge");if(!el)return;
var ds=(d>=0?"+":"")+d.toFixed(0)+"°",sc=SCOPE?", "+SCOPE:"";
if(Math.abs(d)<1.5){el.style.cssText+=";background:#f5efe0;border:1px solid #e6dcc4;color:#6b5a47";
el.innerHTML="🌤️ <b>Tomorrow ~"+tm.toFixed(0)+"°C</b> ("+ds+" vs the last fortnight"+sc+") — in line with recent weather; no big mix shift expected. <span style=\"color:#9a8a7c;font-size:11px\">Live forecast · Open-Meteo</span>";}
else{var warm=d>0,p=function(v){return(v>=0?"+":"")+v.toFixed(1)+"pp"};
el.style.cssText+=";background:"+(warm?"#fdf3e6":"#eef4fb")+";border:1px solid "+(warm?"#f0d8b0":"#cfe0f2")+";color:#4a3a2a";
el.innerHTML="🌤️ <b>Tomorrow ~"+tm.toFixed(0)+"°C</b> ("+ds+" vs the last fortnight"+sc+") → expect <b>cold drinks "+p(C.cold*d)+"</b> · <b>hot drinks "+p(C.hot*d)+"</b> · <b>milkshakes "+p(C.shake*d)+"</b> vs recent mix — prep &amp; stock accordingly. <span style=\"color:#9a8a7c;font-size:11px\">Live forecast · Open-Meteo · weather-sensitivity from 12-mth backtest</span>";}
el.style.display="block";}).catch(function(){});})();</script>
